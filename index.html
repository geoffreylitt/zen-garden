<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { image-rendering: pixelated; }

    #sound-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #sound-settings-dialog {
      background: #4a3728;
      border: 2px solid #6b5340;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      color: #e8dcbc;
      font-family: monospace;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .sound-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #6b5340;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .sound-dialog-close {
      background: none;
      border: none;
      color: #c8b898;
      font-size: 22px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .sound-dialog-close:hover {
      color: #fff;
    }

    .sound-layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sound-layer-row:last-child {
      margin-bottom: 4px;
    }

    .sound-layer-row label {
      flex: 0 0 70px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .sound-layer-row input[type="checkbox"] {
      accent-color: #8a9a6a;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sound-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #6b5340;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sound-slider::-webkit-slider-thumb:hover {
      background: #e8dcbc;
    }

    .sound-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .sound-slider::-moz-range-thumb:hover {
      background: #e8dcbc;
    }

    /* --- Tuning Panel --- */
    #tune-btn-open {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #4a3728;
      color: #e8dcbc;
      border: 1px solid #6b5340;
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      z-index: 1000;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }
    #tune-btn-open:hover { background: #5c4433; }

    #tune-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      height: 100vh;
      background: #2a2018;
      border-left: 2px solid #4a3728;
      overflow-y: auto;
      display: none;
      z-index: 1001;
      font-family: monospace;
      color: #e8dcbc;
      font-size: 12px;
      padding: 14px 16px;
      box-sizing: border-box;
    }
    #tune-panel.open { display: block; }

    .tune-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #4a3728;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .tune-group {
      margin-bottom: 16px;
    }

    .tune-group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #a89878;
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #3a2e20;
    }

    .tune-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #6b5340;
      vertical-align: middle;
    }

    .tune-row {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 8px;
    }

    .tune-label {
      flex: 0 0 115px;
      font-size: 11px;
      color: #c8b898;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tune-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #4a3728;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .tune-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.1s;
    }
    .tune-slider::-webkit-slider-thumb:hover { background: #e8dcbc; }
    .tune-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    .tune-slider::-moz-range-thumb:hover { background: #e8dcbc; }

    .tune-value {
      flex: 0 0 42px;
      text-align: right;
      font-size: 10px;
      color: #8a7a60;
      font-variant-numeric: tabular-nums;
    }

    .tune-btn {
      background: #4a3728;
      color: #e8dcbc;
      border: 1px solid #6b5340;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .tune-btn:hover { background: #5c4433; }

    .tune-close {
      font-size: 16px;
      padding: 2px 8px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
