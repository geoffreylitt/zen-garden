<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disco Garden 🪩</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { image-rendering: pixelated; }

    #sound-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 10, 0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #sound-settings-dialog {
      background: #0d0d22;
      border: 2px solid #ff00ff;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      color: #dd88ff;
      font-family: monospace;
      box-shadow: 0 0 32px rgba(255, 0, 255, 0.4), 0 4px 24px rgba(0, 0, 0, 0.8);
    }

    .sound-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #440044;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #ff44ff;
      text-shadow: 0 0 8px #ff00ff;
    }

    .sound-dialog-close {
      background: none;
      border: none;
      color: #ff44ff;
      font-size: 22px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .sound-dialog-close:hover {
      color: #fff;
      text-shadow: 0 0 6px #fff;
    }

    .sound-layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sound-layer-row:last-child {
      margin-bottom: 4px;
    }

    .sound-layer-row label {
      flex: 0 0 110px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      color: #cc88ff;
    }

    .sound-layer-row input[type="checkbox"] {
      accent-color: #ff00ff;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sound-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #330033;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ff00ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #ff00ff;
    }

    .sound-slider::-webkit-slider-thumb:hover {
      background: #ffffff;
      box-shadow: 0 0 10px #ff88ff;
    }

    .sound-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ff00ff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px #ff00ff;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
