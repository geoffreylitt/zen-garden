<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { image-rendering: pixelated; }

    #sound-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #sound-settings-dialog {
      background: #4a3728;
      border: 2px solid #6b5340;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      color: #e8dcbc;
      font-family: monospace;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .sound-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #6b5340;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .sound-dialog-close {
      background: none;
      border: none;
      color: #c8b898;
      font-size: 22px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .sound-dialog-close:hover {
      color: #fff;
    }

    .sound-layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sound-layer-row:last-child {
      margin-bottom: 4px;
    }

    .sound-layer-row label {
      flex: 0 0 70px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .sound-layer-row input[type="checkbox"] {
      accent-color: #8a9a6a;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sound-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #6b5340;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sound-slider::-webkit-slider-thumb:hover {
      background: #e8dcbc;
    }

    .sound-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #c8b898;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .sound-slider::-moz-range-thumb:hover {
      background: #e8dcbc;
    }

    /* Pattern dialog */
    #pattern-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #pattern-dialog {
      background: #4a3728;
      border: 2px solid #6b5340;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 280px;
      color: #e8dcbc;
      font-family: monospace;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .pattern-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #6b5340;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .pattern-subtitle {
      font-size: 11px;
      color: #a09070;
      margin-bottom: 14px;
    }

    .pattern-btn {
      display: flex;
      flex-direction: column;
      width: 100%;
      background: #5c4433;
      border: 1px solid #7a5c42;
      border-radius: 5px;
      color: #e8dcbc;
      font-family: monospace;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .pattern-btn:last-child {
      margin-bottom: 0;
    }

    .pattern-btn:hover {
      background: #7a5c42;
      border-color: #a07850;
    }

    .pattern-btn:active {
      background: #8a6a50;
    }

    .pattern-btn-name {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    .pattern-btn-desc {
      font-size: 10px;
      color: #a09070;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
