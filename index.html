<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #1a003d 0%, #3d001a 50%, #001a3d 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { image-rendering: pixelated; }

    #sound-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #sound-settings-dialog {
      background: linear-gradient(135deg, #1a003d 0%, #3d001a 100%);
      border: 2px solid #ff00cc;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      color: #ffff00;
      font-family: monospace;
      box-shadow: 0 4px 32px rgba(255, 0, 200, 0.5);
    }

    .sound-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ff00cc;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #ff0080, #ffff00, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sound-dialog-close {
      background: none;
      border: none;
      color: #ff00cc;
      font-size: 22px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      -webkit-text-fill-color: #ff00cc;
    }

    .sound-dialog-close:hover {
      color: #fff;
      -webkit-text-fill-color: #fff;
    }

    .sound-layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sound-layer-row:last-child {
      margin-bottom: 4px;
    }

    .sound-layer-row label {
      flex: 0 0 70px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      color: #00ffff;
    }

    .sound-layer-row input[type="checkbox"] {
      accent-color: #ff00cc;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sound-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: linear-gradient(90deg, #ff0080, #ffff00, #00ffcc);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ff00ff;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
      box-shadow: 0 0 6px #ff00ff;
    }

    .sound-slider::-webkit-slider-thumb:hover {
      background: #ffffff;
      box-shadow: 0 0 10px #ffffff;
    }

    .sound-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ff00ff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px #ff00ff;
    }

    .sound-slider::-moz-range-thumb:hover {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
