<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a0040, #00001a, #001a00, #1a0040);
      background-size: 400% 400%;
      animation: bgshift 8s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    @keyframes bgshift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    canvas { image-rendering: pixelated; }

    #sound-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 0, 60, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #sound-settings-dialog {
      background: linear-gradient(135deg, #2a0060, #003060, #002a00);
      border: 2px solid #ff00cc;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      color: #ff88ff;
      font-family: monospace;
      box-shadow: 0 4px 32px rgba(255, 0, 200, 0.4);
    }

    .sound-dialog-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #cc00ff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      color: #ffff00;
    }

    .sound-dialog-close {
      background: none;
      border: none;
      color: #ff88ff;
      font-size: 22px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .sound-dialog-close:hover {
      color: #ffffff;
    }

    .sound-layer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sound-layer-row:last-child {
      margin-bottom: 4px;
    }

    .sound-layer-row label {
      flex: 0 0 70px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      color: #00ffcc;
    }

    .sound-layer-row input[type="checkbox"] {
      accent-color: #ff00cc;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sound-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #440088;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ff00cc;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sound-slider::-webkit-slider-thumb:hover {
      background: #ffff00;
    }

    .sound-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ff00cc;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .sound-slider::-moz-range-thumb:hover {
      background: #ffff00;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
